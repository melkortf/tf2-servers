name: Build Docker images

on:
  schedule:
    - cron: "0 0 * * *" # At 00:00.
  push:
    branches:
      - "master"
    tags:
      - "*.*.*"
  pull_request:
    branches:
      - "master"
    paths-ignore:
      - "**/*.md"
      - ".vscode/**"
      - "images/**"

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

permissions:
  packages: write

jobs:
  tf2-base-i386:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      tf2-base-i386-tag: ${{ steps.docker_meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/tf2-base
            ${{ env.REGISTRY }}/${{ env.OWNER }}/tf2-base/i386
          tags: |
            type=sha,format=long
            type=schedule,pattern=nightly
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./packages/tf2-base
          file: ./packages/tf2-base/i386.Dockerfile
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          push: true
          platforms: linux/amd64

  tf2-base-amd64:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      tf2-base-amd64-tag: ${{ steps.docker_meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/tf2-base/amd64
          tags: |
            type=sha,format=long
            type=schedule,pattern=nightly
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./packages/tf2-base
          file: ./packages/tf2-base/amd64.Dockerfile
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          push: true
          platforms: linux/amd64

  tf2-sourcemod-i386:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: tf2-base-i386
    outputs:
      tf2-sourcemod-i386-tag: ${{ steps.docker_meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/tf2-sourcemod
            ${{ env.REGISTRY }}/${{ env.OWNER }}/tf2-sourcemod/i386
          tags: |
            type=sha,format=long
            type=schedule,pattern=nightly
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./packages/tf2-sourcemod
          build-args: |
            ARCH=i386
            TF2_BASE_TAG=${{ needs.tf2-base-i386.outputs.tf2-base-i386-tag }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          push: true
          platforms: linux/amd64

  tf2-sourcemod-amd64:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: tf2-base-amd64
    outputs:
      tf2-sourcemod-amd64-tag: ${{ steps.docker_meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/tf2-sourcemod/amd64
          tags: |
            type=sha,format=long
            type=schedule,pattern=nightly
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./packages/tf2-sourcemod
          build-args: |
            ARCH=amd64
            TF2_BASE_TAG=${{ needs.tf2-base-amd64.outputs.tf2-base-amd64-tag }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          push: true
          platforms: linux/amd64

  tf2-mge:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: tf2-sourcemod-i386

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/tf2-mge
            ${{ env.REGISTRY }}/${{ env.OWNER }}/tf2-mge/i386
          tags: |
            type=sha,format=long
            type=schedule,pattern=nightly
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./packages/tf2-mge
          build-args: |
            TF2_SOURCEMOD_TAG=${{ needs.tf2-sourcemod-i386.outputs.tf2-sourcemod-i386-tag }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          push: true
          platforms: linux/amd64

  tf2-competitive:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: tf2-sourcemod-i386

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/tf2-competitive
            ${{ env.REGISTRY }}/${{ env.OWNER }}/tf2-competitive/i386
          tags: |
            type=sha,format=long
            type=schedule,pattern=nightly
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: ./packages/tf2-competitive
          build-args: |
            TF2_SOURCEMOD_TAG=${{ needs.tf2-sourcemod-i386.outputs.tf2-sourcemod-i386-tag }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          push: true
          platforms: linux/amd64

  tf2-dm:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: tf2-sourcemod-i386

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/tf2-dm
            ${{ env.REGISTRY }}/${{ env.OWNER }}/tf2-dm/i386
          tags: |
            type=sha,format=long
            type=schedule,pattern=nightly
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./packages/tf2-dm
          build-args: |
            TF2_SOURCEMOD_TAG=${{ needs.tf2-sourcemod-i386.outputs.tf2-sourcemod-i386-tag }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          push: true
          platforms: linux/amd64

  pr-validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build tf2-base (i386)
        uses: docker/build-push-action@v7
        with:
          context: ./packages/tf2-base
          file: ./packages/tf2-base/i386.Dockerfile
          load: true
          tags: ghcr.io/melkortf/tf2-base/i386:pr

      - name: Verify entrypoint is executable
        run: docker run --rm --entrypoint /bin/bash ghcr.io/melkortf/tf2-base/i386:pr -c 'test -x "${SERVER_DIR}/entrypoint.sh"'

      - name: Smoke test tf2-base (i386)
        run: |
          docker run --detach --name smoke-test ghcr.io/melkortf/tf2-base/i386:pr
          for _ in $(seq 1 30); do
            sleep 10
            running=$(docker inspect --format '{{.State.Running}}' smoke-test)
            health=$(docker inspect --format '{{.State.Health.Status}}' smoke-test)
            echo "running=${running} health=${health}"
            if [ "${health}" = "healthy" ]; then
              docker rm --force smoke-test
              exit 0
            fi
            if [ "${running}" != "true" ] || [ "${health}" = "unhealthy" ]; then
              break
            fi
          done
          docker logs smoke-test
          exit 1

      - name: Build tf2-sourcemod (i386)
        uses: docker/build-push-action@v7
        with:
          context: ./packages/tf2-sourcemod
          load: true
          build-args: |
            ARCH=i386
            TF2_BASE_TAG=pr
          tags: ghcr.io/melkortf/tf2-sourcemod/i386:pr

      - name: Build tf2-competitive
        uses: docker/build-push-action@v7
        with:
          context: ./packages/tf2-competitive
          load: true
          build-args: |
            TF2_SOURCEMOD_TAG=pr
          tags: ghcr.io/melkortf/tf2-competitive:pr

      - name: Build tf2-mge
        uses: docker/build-push-action@v7
        with:
          context: ./packages/tf2-mge
          load: true
          build-args: |
            TF2_SOURCEMOD_TAG=pr
          tags: ghcr.io/melkortf/tf2-mge:pr

      - name: Build tf2-dm
        uses: docker/build-push-action@v7
        with:
          context: ./packages/tf2-dm
          load: true
          build-args: |
            TF2_SOURCEMOD_TAG=pr
          tags: ghcr.io/melkortf/tf2-dm:pr
